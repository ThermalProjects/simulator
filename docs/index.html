<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FOPID Thermal Management</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: 'Courier New', monospace; overflow: hidden; }

    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 270px; height: 100vh;
      background: rgba(245,245,245,0.97);
      border-right: 1px solid #ccc;
      padding: 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      z-index: 10;
    }
    #sidebar label {
      font-size: 12px;
      color: #333;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
    }
    #sidebar input[type=text] {
      width: 100%;
      padding: 5px 8px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      background: #dcdcdc;
      border: 1px solid #aaa;
      color: #222;
      border-radius: 2px;
      outline: none;
    }
    #sidebar input:focus { background: #c8c8c8; }

    .btn {
      width: 100%;
      padding: 10px 0;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 4px;
      font-weight: bold;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(0.9); }
    #btnStart       { background: #87ceeb; color: #003050; }
    #btnStart.active{ background: #b43232; color: #fff; }
    #btnMode        { background: #6495ed; color: #fff; }

    #status-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #aaa; flex-shrink: 0;
    }
    #status-dot.connected    { background: #22cc66; box-shadow: 0 0 6px #22cc66; }
    #status-dot.disconnected { background: #cc3333; }
    #status-dot.logging      { background: #f5a623; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #status-label { font-size: 11px; color: #555; font-family: 'Courier New', monospace; }

    #canvas-container {
      position: fixed;
      left: 270px;
      top: 0;
      right: 0;
      bottom: 60px;
    }

    canvas { display: block; }

    #footer-info {
      position: fixed;
      left: 270px;
      bottom: 0;
      right: 0;
      height: 60px;
      background: #f5f5f5;
      border-top: none;
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 10;
      transition: background 0.25s;
    }
    #footer-info.active { background: #f5f5f5; }
    #footer-default {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #aaa;
      font-style: italic;
    }
    #footer-hint { display: none; flex-direction: column; gap: 3px; }
    #footer-hint .hint-title {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      color: #003090;
    }
    #footer-hint .hint-body {
      font-family: 'Courier New', monospace;
      font-size: 11.5px;
      color: #333;
      line-height: 1.5;
    }
    #footer-hint .hint-tag {
      display: inline-block;
      background: #dde8ff;
      border: 1px solid #99b;
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 10px;
      color: #446;
      margin-left: 10px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="status-row">
    <span id="status-dot" class="disconnected"></span>
    <span id="status-label">Not connected</span>
  </div>

  <label>Setpoint Temp (°C)</label>
  <input id="txtTref" type="text" value="15.0"/>

  <label>Kp</label>
  <input id="txtKp" type="text" value="58.93"/>

  <label>Ki</label>
  <input id="txtKi" type="text" value="3.91"/>

  <label>Kd</label>
  <input id="txtKd" type="text" value="2.66"/>

  <label>λ (lambda)</label>
  <input id="txtLam" type="text" value="0.67"/>

  <label>μ (mu)</label>
  <input id="txtMu" type="text" value="1.47"/>

  <label>Trial duration [s]</label>
  <input id="txtDuracion" type="text" value="300"/>

  <label>Ambient temperature (°C)</label>
  <input id="txtTamb" type="text" value="20.0"/>

  <label>Relative humidity (%)</label>
  <input id="txtRH" type="text" value="70.0"/>

  <button class="btn" id="btnStart">Start trial</button>
  <button class="btn" id="btnMode">Mode: Setpoint</button>
</div>

<div id="canvas-container"></div>

<div id="footer-info">
  <div id="footer-default">Click any parameter to see its effect on the controller response</div>
  <div id="footer-hint">
    <span class="hint-title" id="hint-title"></span>
    <span class="hint-body" id="hint-body"></span>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const WS_URL = "wss://simulator-z13i.onrender.com";

  let ws = null;
  let wsConnected = false;

  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-label');

  function setStatus(cls, text){ dot.className = cls; lbl.textContent = text; }

  function connectWS(){
    if(ws){ try{ ws.close(); }catch(e){} }
    setStatus('disconnected','Connecting…');
    ws = new WebSocket(WS_URL);

    ws.onopen  = () => { wsConnected=true;  setStatus('connected','Connected'); };
    ws.onclose = () => { wsConnected=false; setStatus('disconnected','Not connected');
                         setTimeout(connectWS, 5000); };
    ws.onerror = ()  => { setStatus('disconnected','Connection error'); };

    ws.onmessage = (evt) => {
      const line = evt.data.trim();
      if(!line) return;
      if(line==='START' || line==='STOP' || line.startsWith('CMD')) return;
      const vals = line.split(',');
      if(vals.length < 6) return;

      const newTsup = parseFloat(vals[1]);
      const newTdew = parseFloat(vals[3]);
      const newPwm  = parseFloat(vals[4]);
      if(isNaN(newTsup) || isNaN(newTdew)) return;

      prevTsup       = nextTsup;
      prevTdew       = nextTdew;
      prevPwmPeltier = nextPwmPeltier;

      nextTamb       = parseFloat(vals[0]);
      nextTsup       = newTsup;
      nextRH         = parseFloat(vals[2]);
      nextTdew       = newTdew;
      nextPwmPeltier = newPwm;
      pwmFan         = parseFloat(vals[5]);
      interpTimer    = 0;

      if(isLogging){
        const t = (Date.now() - startTime) / 1000;
        histTime.push(t);
        histTsup.push(newTsup);
        histTdew.push(newTdew);
        histPeltier.push(newPwm);
        histFan.push(pwmFan);
      }
    };
  }

  connectWS();

  function sendMsg(msg){
    if(ws && ws.readyState === WebSocket.OPEN) ws.send(msg);
  }

  // ── State ──────────────────────────────────────────
  let prevPwmPeltier=0, nextPwmPeltier=0, pwmPeltier=0;
  let Tsup=20, Tdew=0, Tref=25;
  let nextTamb=20, nextTsup=20, nextRH=70, nextTdew=0;
  let pwmFan=0;
  let isLogging=false, startTime=0;
  let trialMetrics=null;
  let ensayoNumero=0, ensayoDuracion=300;
  let showTdew=false, justFinished=false;
  let histTsup=[], histTdew=[], histPeltier=[], histFan=[], histTime=[];
  let prevTsup=20, prevTdew=0;
  let interpTimer=0;
  const Tsamp=0.2, interpStep=0.05;

  // Reference to the p5 sketch instance (set below)
  let p5instance = null;

  const g  = id => document.getElementById(id);
  const gv = id => g(id).value.trim();
  const gf = (id,d) => { const v=parseFloat(gv(id)); return isNaN(v)?d:v; };

  // ── Buttons ─────────────────────────────────────────
  g('btnStart').addEventListener('click', () => {
    if(!isLogging){
      if(!wsConnected){ alert('Waiting for connection…'); return; }
      Tref           = gf('txtTref',25);
      ensayoDuracion = gf('txtDuracion',300);
      const Tambv    = gf('txtTamb',20);
      const RHv      = gf('txtRH',70);
      const Kp       = gf('txtKp',58.93);
      const Ki       = gf('txtKi',3.91);
      const Kd       = gf('txtKd',2.66);
      const lam      = gf('txtLam',0.67);
      const mu       = gf('txtMu',1.47);

      isLogging=true; startTime=Date.now(); ensayoNumero++;
      trialMetrics=null;
      histTsup=[]; histTdew=[]; histPeltier=[]; histFan=[]; histTime=[];
      prevTsup=nextTsup=Tambv;
      prevTdew=nextTdew=0;
      prevPwmPeltier=nextPwmPeltier=0;
      interpTimer=0;

      sendMsg(`START,${Tref},${Kp},${Ki},${Kd},${lam},${mu},${ensayoDuracion},${Tambv},${RHv}\n`);
      g('btnStart').textContent='Stop trial';
      g('btnStart').classList.add('active');
      setStatus('logging','Trial in progress');
    } else {
      isLogging=false;
      sendMsg('STOP\n');
      justFinished=true;
      trialMetrics=calcMetrics(histTsup, Tref, histTime);
      g('btnStart').textContent='Start trial';
      g('btnStart').classList.remove('active');
      setStatus('connected','Connected');
    }
  });

  g('btnMode').addEventListener('click', () => {
    showTdew=!showTdew;
    g('btnMode').textContent = showTdew ? 'Mode: Dew Point' : 'Mode: Setpoint';
    sendMsg(showTdew ? 'MODE_TDEW_ON\n' : 'MODE_TDEW_OFF\n');
  });

  // ── p5 sketch ────────────────────────────────────────
  new p5(function(s){
    p5instance = s;

    const C = {
      bg:       () => s.color(245),
      panel:    () => s.color(255),
      border:   () => s.color(180),
      title:    () => s.color(0,80,140),
      text:     () => s.color(0),
      green:    () => s.color(0,150,0),
      blue:     () => s.color(0,0,255),
      magenta:  () => s.color(255,0,255),
      gridLine: () => s.color(200),
      gridTxt:  () => s.color(50),
    };

    s.setup = function(){
      const container = document.getElementById('canvas-container');
      const cnv = s.createCanvas(container.offsetWidth, container.offsetHeight);
      cnv.parent('canvas-container');
      s.textFont('Courier New');
    };

    s.windowResized = function(){
      const container = document.getElementById('canvas-container');
      s.resizeCanvas(container.offsetWidth, container.offsetHeight);
    };

    s.draw = function(){
      s.background(C.bg());

      interpTimer += interpStep;
      const ratio = s.constrain(interpTimer/Tsamp, 0, 1);
      Tsup       = s.lerp(prevTsup,       nextTsup,       ratio);
      Tdew       = s.lerp(prevTdew,       nextTdew,       ratio);
      pwmPeltier = s.lerp(prevPwmPeltier, nextPwmPeltier, ratio);

      // Compute graph left edge for alignment
      const _fullW = s.width - 60 - 20;
      const _gw    = _fullW * 0.90;
      const _gx    = 60 + (_fullW - _gw) / 2;

      // Title
      s.textSize(22); s.fill(C.title()); s.textAlign(s.LEFT,s.TOP); s.noStroke();
      s.text('Fractional Order PID Thermal System Simulator', _gx, 10);
      s.textSize(11); s.fill(s.color(100,100,130));
      s.text('Peltier cell thermal control  ·  FOPID controller', _gx, 36);

      // Info readouts (no parameters shown here)
      const infoY=56;
      s.textSize(13); s.fill(C.text()); s.textAlign(s.LEFT,s.TOP);
      s.text(`Cold side temperature:      ${s.nf(Tsup,1,2)} °C`,     _gx, infoY);
      s.text(`Ambient temperature: ${gv('txtTamb')} °C`,       _gx, infoY+18);
      s.text(`Dew point temperature:      ${s.nf(Tdew,1,2)} °C`,     _gx, infoY+36);
      s.text(`PWM Peltier:         ${s.nf(pwmPeltier,1,0)}`,   _gx, infoY+54);

      // Metrics column — top-right corner, aligned with graph right edge
      if(trialMetrics && !isLogging){
        const _fullW2 = s.width - 60 - 20;
        const _gw2    = _fullW2 * 0.90;
        const _grx    = 60 + (_fullW2 - _gw2) / 2 + _gw2; // right edge of graph
        const mLines = [
          ['TRIAL METRICS', null],
          ['RMSE',       trialMetrics.rmse.toFixed(3) + ' °C'],
          ['MAE',        trialMetrics.mae.toFixed(3)  + ' °C'],
          ['Undershoot', trialMetrics.undershoot.toFixed(3) + ' °C'],
          ['SS error',   trialMetrics.ssError.toFixed(3) + ' °C'],
          ['Rise time',  (trialMetrics.riseTime!==null?trialMetrics.riseTime.toFixed(1):'N/A') + ' s'],
          ['Settling',   (trialMetrics.settlingTime!==null?trialMetrics.settlingTime.toFixed(1):'N/A') + ' s'],
        ];
        const lineH = 17;
        const colLabel = _grx - 160;
        const colVal   = _grx;
        mLines.forEach(([label, val], i) => {
          const y = 10 + i * lineH;
          if(val === null){
            s.textSize(10); s.fill(s.color(0,60,120));
            s.textAlign(s.RIGHT, s.TOP);
            s.text('── TRIAL METRICS ──', colVal, y);
          } else {
            s.textSize(11);
            s.textAlign(s.LEFT, s.TOP);
            s.fill(s.color(90,90,90));
            s.text(label, colLabel, y);
            s.textAlign(s.RIGHT, s.TOP);
            s.fill(s.color(20,20,20));
            s.text(val, colVal, y);
          }
        });
        s.textAlign(s.LEFT, s.TOP);
      }

            // Trial timer
      if(isLogging){
        const elapsed=Math.floor((Date.now()-startTime)/1000);
        s.fill(C.text());
        s.text(`Trial nº: ${ensayoNumero}`,                       _gx, infoY+72);
        s.text(`Time: ${elapsed} s / ${ensayoDuracion} s`,        _gx, infoY+90);
        if(elapsed>=ensayoDuracion){
          isLogging=false; justFinished=true;
          trialMetrics=calcMetrics(histTsup, Tref, histTime);
          g('btnStart').textContent='Start trial';
          g('btnStart').classList.remove('active');
          sendMsg('STOP\n');
          setStatus('connected','Connected');
        }
      }

      drawGraph(s, C);

      if(justFinished){
        justFinished=false;
      }
    };

  }, document.getElementById('canvas-container'));

  // ── Graph (20% smaller) ───────────────────────────────
  // Original margins: gx=60, gy=150, right=20, bottom=70
  // Scale gw/gh by 0.8, keep origin roughly centered
  function drawGraph(s, C){
    const scaleFactor = 0.90;

    // Full available area
    const fullW = s.width  - 60 - 20;
    const fullH = s.height - 150 - 70;

    // Scaled size
    const gw = fullW * scaleFactor;
    const gh = fullH * scaleFactor;

    // Center the smaller graph in the available space
    const offsetX = (fullW - gw) / 2;
    const offsetY = (fullH - gh) / 2;

    const gx = 60  + offsetX;
    const gy = 150 + offsetY;

    const tMin=0, tMax=40;
    const yLines=8, xLines=6;

    s.fill(C.panel()); s.stroke(C.border()); s.strokeWeight(1);
    s.rect(gx, gy, gw, gh, 6);

    // Legend
    const lx=gx+15, ly=gy+14, lsz=11;
    s.noStroke(); s.fill(C.green()); s.rect(lx,ly,lsz,lsz);
    s.fill(C.text()); s.textSize(11); s.textAlign(s.LEFT,s.CENTER);
    s.text('Tsup', lx+lsz+4, ly+lsz/2);
    if(showTdew){
      s.fill(C.magenta()); s.rect(lx+70,ly,lsz,lsz);
      s.fill(C.text()); s.text('Tdew', lx+70+lsz+4, ly+lsz/2);
    } else {
      s.fill(C.blue()); s.rect(lx+140,ly,lsz,lsz);
      s.fill(C.text()); s.text('Tref', lx+140+lsz+4, ly+lsz/2);
    }

    // Y grid
    s.stroke(C.gridLine()); s.strokeWeight(1);
    for(let i=0;i<=yLines;i++){
      const y=gy+gh-i*gh/yLines;
      s.line(gx,y,gx+gw,y);
      s.fill(C.gridTxt()); s.noStroke();
      s.textSize(11); s.textAlign(s.RIGHT,s.CENTER);
      s.text((tMin+i*(tMax-tMin)/yLines).toFixed(0), gx-6, y);
      s.stroke(C.gridLine());
    }

    if(histTime.length < 2) return;

    const tStart=histTime[0];
    const tEnd=Math.max(histTime[histTime.length-1], tStart+1);

    // X grid
    for(let i=0;i<=xLines;i++){
      const xVal=s.lerp(tStart,tEnd,i/xLines);
      const x=s.map(xVal,tStart,tEnd,gx,gx+gw);
      s.stroke(C.gridLine()); s.line(x,gy,x,gy+gh);
      s.fill(C.gridTxt()); s.noStroke();
      s.textSize(11); s.textAlign(s.CENTER,s.TOP);
      s.text(xVal.toFixed(0), x, gy+gh+4);
    }

    // Axis labels
    s.fill(C.text()); s.noStroke(); s.textSize(13);
    s.textAlign(s.CENTER,s.TOP);
    s.text('Time [s]', gx+gw/2, gy+gh+30);
    s.push(); s.translate(gx-42,gy+gh/2); s.rotate(-Math.PI/2);
    s.textAlign(s.CENTER,s.CENTER); s.text('Temperature [°C]',0,0); s.pop();

    // Tref line
    if(!showTdew){
      s.stroke(C.blue()); s.strokeWeight(1.5);
      const yRef=s.map(Tref,0,tMax,gy+gh,gy);
      s.line(gx,yRef,gx+gw,yRef);
    }

    // Tsup curve
    s.stroke(C.green()); s.strokeWeight(2); s.noFill(); s.beginShape();
    for(let i=0;i<histTsup.length;i++){
      const x=s.constrain(s.map(histTime[i],tStart,tEnd,gx,gx+gw),gx,gx+gw);
      const y=s.constrain(s.map(histTsup[i],0,tMax,gy+gh,gy),gy,gy+gh);
      s.vertex(x,y);
    }
    s.endShape();

    // Tdew curve
    if(showTdew){
      s.stroke(C.magenta()); s.strokeWeight(1.5); s.noFill(); s.beginShape();
      for(let i=0;i<histTdew.length;i++){
        const x=s.constrain(s.map(histTime[i],tStart,tEnd,gx,gx+gw),gx,gx+gw);
        const y=s.constrain(s.map(histTdew[i],0,tMax,gy+gh,gy),gy,gy+gh);
        s.vertex(x,y);
      }
      s.endShape();
    }
  }

  // ── Screenshot export with metrics report ──────────
  function calcMetrics(tsup, tref, times){
    if(!tsup || tsup.length < 2) return null;
    const n = tsup.length;

    // RMSE
    let sumSq = 0;
    tsup.forEach(v => sumSq += (v - tref)**2);
    const rmse = Math.sqrt(sumSq / n);

    // MAE
    let sumAbs = 0;
    tsup.forEach(v => sumAbs += Math.abs(v - tref));
    const mae = sumAbs / n;

    // Overshoot: max exceedance beyond setpoint in cooling direction
    // (if cooling: undershoot = going below tref)
    const cooling = tsup[0] > tref;
    let overshoot = 0, undershoot = 0;
    tsup.forEach(v => {
      if(cooling){
        const under = tref - v;  // positive = below setpoint
        if(under > undershoot) undershoot = under;
        const over  = v - tsup[tsup.length-1]; // above final
        if(over  > overshoot)  overshoot  = over;
      } else {
        const over  = v - tref;
        if(over  > overshoot)  overshoot  = over;
        const under = tref - v;
        if(under > undershoot) undershoot = under;
      }
    });

    // Steady-state error: mean of last 10% of samples
    const tail = tsup.slice(-Math.max(1, Math.floor(n*0.1)));
    const ssMean = tail.reduce((a,b)=>a+b,0)/tail.length;
    const ssError = Math.abs(ssMean - tref);

    // Rise time: time from 10% to 90% of total change
    const T0   = tsup[0];
    const Tfin = ssMean;
    const span = Math.abs(Tfin - T0);
    let t10 = null, t90 = null;
    for(let i=0;i<tsup.length;i++){
      const prog = Math.abs(tsup[i] - T0) / (span||1);
      if(t10===null && prog >= 0.10) t10 = times[i];
      if(t90===null && prog >= 0.90) t90 = times[i];
    }
    const riseTime = (t10!==null && t90!==null) ? (t90 - t10) : null;

    // Settling time: last time |error| > 2% of span
    const band = 0.02 * (span||1);
    let settlingTime = null;
    for(let i=tsup.length-1;i>=0;i--){
      if(Math.abs(tsup[i]-Tfin) > band){ settlingTime = times[i]; break; }
    }

    return { rmse, mae, overshoot, undershoot, ssError, riseTime, settlingTime };
  }

  function captureAndSave(){
    const p5canvas = document.querySelector('#canvas-container canvas');
    if(!p5canvas){ return; }

    const metrics = calcMetrics(histTsup, Tref, histTime);

    const panelW = 340;
    const imgW   = p5canvas.width + panelW;
    const imgH   = Math.max(p5canvas.height, 600);

    const offscreen = document.createElement('canvas');
    offscreen.width  = imgW;
    offscreen.height = imgH;
    const ctx = offscreen.getContext('2d');

    // Background
    ctx.fillStyle = '#f0f2f8';
    ctx.fillRect(0, 0, imgW, imgH);

    // p5 canvas
    ctx.drawImage(p5canvas, 0, 0);

    // Panel background
    const px = p5canvas.width;
    ctx.fillStyle = '#fff';
    ctx.fillRect(px, 0, panelW, imgH);
    ctx.strokeStyle = '#b0b8cc';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,imgH); ctx.stroke();

    const col = px + 18;
    let cy = 28;

    // Helper draw functions
    function sectionTitle(text){
      ctx.fillStyle = '#001a60';
      ctx.font = 'bold 13px "Courier New", monospace';
      ctx.fillText(text, col, cy);
      cy += 6;
      ctx.strokeStyle = '#99aacc';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(col, cy); ctx.lineTo(px+panelW-18, cy); ctx.stroke();
      cy += 14;
    }
    function row(label, value, unit='', highlight=false){
      ctx.font = '11px "Courier New", monospace';
      ctx.fillStyle = highlight ? '#440088' : '#555';
      ctx.fillText(label, col, cy);
      ctx.font = highlight ? 'bold 11px "Courier New", monospace' : '11px "Courier New", monospace';
      ctx.fillStyle = highlight ? '#440088' : '#111';
      ctx.fillText(value + (unit ? ' '+unit : ''), col + 175, cy);
      cy += 18;
    }
    function gap(n=8){ cy += n; }

    // Title
    ctx.fillStyle = '#001a60';
    ctx.font = 'bold 15px "Courier New", monospace';
    ctx.fillText('FOPID Trial Report', col, cy); cy += 22;
    ctx.font = '10px "Courier New", monospace';
    ctx.fillStyle = '#888';
    const now = new Date();
    ctx.fillText(now.toLocaleString(), col, cy); cy += 24;

    // Parameters section
    sectionTitle('CONTROLLER PARAMETERS');
    row('Setpoint Tref',     gv('txtTref'),    '°C', true);
    row('Kp',                gv('txtKp'),      '');
    row('Ki',                gv('txtKi'),      '');
    row('Kd',                gv('txtKd'),      '');
    row('λ (lambda)',         gv('txtLam'),     '');
    row('μ (mu)',             gv('txtMu'),      '');
    gap();

    sectionTitle('TEST CONDITIONS');
    row('Ambient Temp',      gv('txtTamb'),    '°C');
    row('Rel. Humidity',     gv('txtRH'),      '%');
    row('Duration',          gv('txtDuracion'),'s');
    row('Trial nº',          String(ensayoNumero), '');
    row('Samples',           String(histTsup.length), '');
    gap();

    sectionTitle('PERFORMANCE METRICS');
    if(metrics){
      row('RMSE',            metrics.rmse.toFixed(3),       '°C', true);
      row('MAE',             metrics.mae.toFixed(3),        '°C', true);
      row('Undershoot',      metrics.undershoot.toFixed(3), '°C');
      row('Steady-state err',metrics.ssError.toFixed(3),    '°C', true);
      row('Rise time (10→90%)', metrics.riseTime!==null ? metrics.riseTime.toFixed(1) : 'N/A', 's');
      row('Settling time (2%)', metrics.settlingTime!==null ? metrics.settlingTime.toFixed(1) : 'N/A', 's');
    } else {
      ctx.font = '11px "Courier New", monospace';
      ctx.fillStyle = '#999';
      ctx.fillText('No data available', col, cy); cy+=18;
    }

    const dataURL = offscreen.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataURL;
    a.download = `FOPID_Tamb${gv('txtTamb')}_Tref${gv('txtTref')}_trial${String(ensayoNumero).padStart(3,'0')}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  


  // ── Contextual footer hints ──────────────────────────
  const HINTS = {
    txtTref: {
      title: 'Setpoint (Tref)',
      body:  'Target temperature the controller will track. Lowering it forces the Peltier to cool more aggressively.'
    },
    txtKp: {
      title: 'Kp — Proportional gain',
      body:  'Higher Kp → faster response but more overshoot and risk of oscillation. Lower Kp → slower, more stable approach.'
    },
    txtKi: {
      title: 'Ki — Integral gain',
      body:  'Higher Ki → eliminates steady-state error faster, but too high causes sustained oscillation or windup.'
    },
    txtKd: {
      title: 'Kd — Derivative gain',
      body:  'Higher Kd → dampens overshoot and oscillations. Excessive Kd amplifies noise and can destabilise the loop.'
    },
    txtLam: {
      title: 'λ (lambda) — Fractional integrator order',
      body:  'Values < 1 give the integrator long memory of past errors, improving disturbance rejection. Values > 1 approach a double integrator.'
    },
    txtMu: {
      title: 'μ (mu) — Fractional derivative order',
      body:  'Values > 1 give a smoother derivative action than classic PD. Values < 1 make it more reactive to fast changes.'
    },
    txtDuracion: {
      title: 'Trial duration',
      body:  'Total recording time in seconds. The trial stops automatically and exports a PNG report when this time elapses.'
    },
    txtTamb: {
      title: 'Ambient temperature',
      body:  'Sets the thermal load baseline for the simulator. Higher ambient temp means the Peltier works harder to cool.'
    },
    txtRH: {
      title: 'Relative humidity',
      body:  'High RH raises the dew point, increasing condensation risk on the cold surface. Monitor Tdew vs Tsup.'
    }
  };

  const footerInfo    = document.getElementById('footer-info');
  const footerDefault = document.getElementById('footer-default');
  const footerHint    = document.getElementById('footer-hint');
  const hintTitle     = document.getElementById('hint-title');
  const hintBody      = document.getElementById('hint-body');

  Object.keys(HINTS).forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('focus', () => {
      const h = HINTS[id];
      hintTitle.textContent = h.title;
      hintBody.textContent  = h.body;
      footerDefault.style.display = 'none';
      footerHint.style.display    = 'flex';
      footerInfo.classList.add('active');
    });
    el.addEventListener('blur', () => {
      footerDefault.style.display = '';
      footerHint.style.display    = 'none';
      footerInfo.classList.remove('active');
    });
  });



}); // DOMContentLoaded
</script>
</body>
</html>
