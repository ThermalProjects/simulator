<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FOPID Thermal Management</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: 'Courier New', monospace; overflow: hidden; }
    #canvas-container { position: relative; }

    /* ── Sidebar overlay (replaces ControlP5) ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 270px; height: 100vh;
      background: rgba(245,245,245,0.97);
      border-right: 1px solid #ccc;
      padding: 60px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      z-index: 10;
    }
    #sidebar label {
      font-size: 12px;
      color: #333;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
    }
    #sidebar input[type=text], #sidebar input[type=number] {
      width: 100%;
      padding: 5px 8px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      background: #dcdcdc;
      border: 1px solid #aaa;
      color: #222;
      border-radius: 2px;
      outline: none;
    }
    #sidebar input:focus { background: #c8c8c8; }

    .btn {
      width: 100%;
      padding: 10px 0;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 4px;
      font-weight: bold;
      letter-spacing: 0.3px;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(0.9); }
    #btnStart  { background: #87ceeb; color: #003050; }
    #btnStart.active { background: #b43232; color: #fff; }
    #btnMode   { background: #6495ed; color: #fff; }

    /* ── Status dot ── */
    #status-dot {
      position: fixed; top: 14px; left: 16px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #aaa;
      z-index: 20;
    }
    #status-dot.connected    { background: #22cc66; box-shadow: 0 0 6px #22cc66; }
    #status-dot.disconnected { background: #cc3333; }
    #status-dot.logging      { background: #f5a623; animation: pulse 0.8s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }
    #status-label {
      position: fixed; top: 10px; left: 32px;
      font-size: 11px; color: #555;
      font-family: 'Courier New', monospace;
      z-index: 20;
    }

    /* ── WS URL config ── */
    #ws-bar {
      position: fixed; top: 0; left: 270px;
      right: 0; height: 36px;
      background: #e8e8e8;
      border-bottom: 1px solid #bbb;
      display: flex; align-items: center;
      padding: 0 12px; gap: 8px;
      z-index: 10;
    }
    #ws-bar label { font-size: 11px; color:#555; white-space:nowrap; }
    #wsUrl {
      flex: 1;
      font-size: 12px;
      padding: 3px 6px;
      border: 1px solid #aaa;
      border-radius: 2px;
      font-family: 'Courier New', monospace;
      background: #fff;
    }
    #btnConnect {
      padding: 3px 12px;
      font-size: 12px;
      background: #444; color: #fff;
      border: none; border-radius: 2px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }
    #btnConnect:hover { background: #222; }

    canvas { display: block; }
  </style>
</head>
<body>

<!-- Status -->
<div id="status-dot" class="disconnected"></div>
<div id="status-label">Sin conexión</div>

<!-- WebSocket URL bar -->
<div id="ws-bar">
  <label>WebSocket:</label>
  <input id="wsUrl" type="text" value="wss://simulator-z13i.onrender.com"/>
  <button id="btnConnect">Conectar</button>
</div>

<!-- Sidebar (ControlP5 equivalent) -->
<div id="sidebar">
  <label>T Consigna (°C)</label>
  <input id="txtTref" type="text" value="25.0"/>

  <label>Kp</label>
  <input id="txtKp" type="text" value="58.93"/>

  <label>Ki</label>
  <input id="txtKi" type="text" value="3.91"/>

  <label>Kd</label>
  <input id="txtKd" type="text" value="2.66"/>

  <label>λ (lambda)</label>
  <input id="txtLam" type="text" value="0.67"/>

  <label>μ (mu)</label>
  <input id="txtMu" type="text" value="1.47"/>

  <label>Duración ensayo [s]</label>
  <input id="txtDuracion" type="text" value="300"/>

  <label>Temperatura ambiente (°C)</label>
  <input id="txtTamb" type="text" value="20.0"/>

  <label>Humedad relativa (%)</label>
  <input id="txtRH" type="text" value="70.0"/>

  <button class="btn" id="btnStart">Iniciar ensayo</button>
  <button class="btn" id="btnMode">Modo: Consigna</button>
</div>

<div id="canvas-container"></div>

<script>

  document.addEventListener("DOMContentLoaded", function () {

// ── WebSocket ──────────────────────────────────────────────
let ws = null;
let wsConnected = false;

const dot   = document.getElementById('status-dot');
const label = document.getElementById('status-label');
const wsUrlEl = document.getElementById('wsUrl');

function setStatus(state, text){
  dot.className = state;
  label.textContent = text;
}

function connectWS(){
  if(ws){ ws.close(); }
  const url = wsUrlEl.value.trim();
  setStatus('disconnected','Conectando…');
  ws = new WebSocket(url);

  ws.onopen  = () => { wsConnected=true;  setStatus('connected','Conectado'); };
  ws.onclose = () => { wsConnected=false; setStatus('disconnected','Sin conexión'); };
  ws.onerror = ()  => { setStatus('disconnected','Error de conexión'); };

  ws.onmessage = (evt) => {
    const line = evt.data.trim();
    if(!line) return;
    if(line.startsWith('CMD') || line==='START' || line==='STOP') return;
    const vals = line.split(',');
    if(vals.length < 6) return;

    const newTsup = parseFloat(vals[1]);
    const newTdew = parseFloat(vals[3]);
    const newPwm  = parseFloat(vals[4]);

    if(isNaN(newTsup) || isNaN(newTdew)) return;  // ← protección NaN

    // guardar prev ANTES de actualizar next
    prevTsup          = nextTsup;
    prevTdew          = nextTdew;
    prevPwmPeltier    = nextPwmPeltier;

    nextTamb          = parseFloat(vals[0]);
    nextTsup          = newTsup;
    nextRH            = parseFloat(vals[2]);
    nextTdew          = newTdew;
    nextPwmPeltier    = newPwm;
    pwmFan            = parseFloat(vals[5]);
    interpTimer       = 0;   // reiniciar interpolación

    if(isLogging){
      const t = (Date.now() - startTime) / 1000;
      histTime.push(t);
      histTsup.push(newTsup);
      histTdew.push(newTdew);
      histPeltier.push(newPwm);
      histFan.push(pwmFan);
    }
  };
}

document.getElementById('btnConnect').addEventListener('click', connectWS);

function sendMsg(msg){
  if(ws && wsConnected) ws.send(msg);
}

// ── State ────────────────────────────────────────────────
let prevPwmPeltier=0, nextPwmPeltier=0, pwmPeltier=0;
let Tamb=20, Tsup=20, Tdew=0, RH=70, Tref=25;
let nextTamb=20, nextTsup=20, nextRH=70, nextTdew=0;
let pwmFan=0;
let isLogging=false;
let startTime=0;
let ensayoNumero=0, ensayoDuracion=300;
let showTdew=false;
let justFinished=false;

let histTsup=[], histTdew=[], histPeltier=[], histFan=[], histTime=[];

let prevTsup=0, prevTdew=0;
let interpTimer=0;
const Tsamp=0.2, interpStep=0.05;

const g = s => document.getElementById(s);
const gv = s => g(s).value.trim();
const gf = (s,d) => { const v=parseFloat(gv(s)); return isNaN(v)?d:v; };

// ── Start / Stop ─────────────────────────────────────────
g('btnStart').addEventListener('click', () => {
  if(!isLogging){
    Tref          = gf('txtTref', 25);
    ensayoDuracion= gf('txtDuracion', 300);
    const Tambv   = gf('txtTamb', 20);
    const RHv     = gf('txtRH', 70);
    const Kp      = gf('txtKp', 58.93);
    const Ki      = gf('txtKi', 3.91);
    const Kd      = gf('txtKd', 2.66);
    const lam     = gf('txtLam', 0.67);
    const mu      = gf('txtMu', 1.47);

    isLogging=true; startTime=Date.now(); ensayoNumero++;
    histTsup=[]; histTdew=[]; histPeltier=[]; histFan=[]; histTime=[];
    prevTsup=nextTsup=Tref; prevTdew=nextTdew=Tdew;
    interpTimer=0; prevPwmPeltier=nextPwmPeltier=0;

    sendMsg(`START,${Tref},${Kp},${Ki},${Kd},${lam},${mu},${ensayoDuracion},${Tambv},${RHv}\n`);

    g('btnStart').textContent='Detener ensayo';
    g('btnStart').classList.add('active');
    setStatus('logging','Ensayo en curso');
  } else {
    isLogging=false;
    sendMsg('STOP\n');
    justFinished=true;
    g('btnStart').textContent='Iniciar ensayo';
    g('btnStart').classList.remove('active');
    setStatus('connected','Conectado');
  }
});

g('btnMode').addEventListener('click', () => {
  showTdew = !showTdew;
  if(showTdew){
    sendMsg('MODE_TDEW_ON\n');
    g('btnMode').textContent='Modo: Rocío';
  } else {
    sendMsg('MODE_TDEW_OFF\n');
    g('btnMode').textContent='Modo: Consigna';
  }
});

// ── p5.js sketch ─────────────────────────────────────────
new p5(function(s){

  // colours
  const C = {
    bg:      s.color(245),
    panel:   s.color(255),
    border:  s.color(180),
    title:   s.color(0,80,140),
    text:    s.color(0),
    param:   s.color(50,0,120),
    green:   s.color(0,150,0),
    blue:    s.color(0,0,255),
    magenta: s.color(255,0,255),
    gridLine:s.color(200),
    gridTxt: s.color(50),
  };

  // canvas geometry — canvas starts right of sidebar
  const SB = 270; // sidebar width
  const WB = 36;  // top wsbar height

  s.setup = function(){
    const cnv = s.createCanvas(window.innerWidth - SB, window.innerHeight - WB);
    cnv.parent('canvas-container');
    // offset canvas below wsbar and right of sidebar
    cnv.elt.style.marginTop  = WB  + 'px';
    cnv.elt.style.marginLeft = SB  + 'px';
    s.textFont('Courier New');
  };

  s.windowResized = function(){
    s.resizeCanvas(window.innerWidth - SB, window.innerHeight - WB);
  };

  s.draw = function(){
    s.background(C.bg);

    // ── Interpolation ──
    interpTimer += interpStep;
    const ratio = s.constrain(interpTimer / Tsamp, 0, 1);
    Tsup       = s.lerp(prevTsup,       nextTsup,       ratio);
    Tdew       = s.lerp(prevTdew,       nextTdew,       ratio);
    pwmPeltier = s.lerp(prevPwmPeltier, nextPwmPeltier, ratio);

    // ── Title ──
    s.textSize(22); s.fill(C.title); s.textAlign(s.LEFT, s.TOP); s.noStroke();
    s.text('Fractional PID Thermal System Simulator', 10, 10);

    // ── Info strip ──
    const infoY = 50;
    s.textSize(13); s.fill(C.text); s.textAlign(s.LEFT, s.TOP);
    s.text(`Temperatura célula:    ${s.nf(Tsup,1,2)} °C`,      10, infoY);
    s.text(`Temperatura ambiente:  ${gv('txtTamb')} °C`,        10, infoY+18);
    s.text(`Temperatura rocío:     ${s.nf(Tdew,1,2)} °C`,      10, infoY+36);
    s.text(`PWM Peltier:           ${s.nf(pwmPeltier,1,0)}`,    10, infoY+54);

    // ── Params column ──
    const paramX = s.width - 230;
    let   paramY = infoY;
    s.fill(C.param); s.textAlign(s.LEFT, s.TOP);
    s.text(`T Consigna: ${gv('txtTref')}`,  paramX, paramY); paramY+=18;
    s.text(`Kp: ${gv('txtKp')}`,            paramX, paramY); paramY+=18;
    s.text(`Ki: ${gv('txtKi')}`,            paramX, paramY); paramY+=18;
    s.text(`Kd: ${gv('txtKd')}`,            paramX, paramY); paramY+=18;
    s.text(`λ:  ${gv('txtLam')}`,           paramX, paramY); paramY+=18;
    s.text(`μ:  ${gv('txtMu')}`,            paramX, paramY); paramY+=18;

    // ── Ensayo timer ──
    if(isLogging){
      const elapsed = Math.floor((Date.now()-startTime)/1000);
      s.fill(C.text);
      s.text(`Ensayo nº: ${ensayoNumero}`,                        10, infoY+72);
      s.text(`Tiempo: ${elapsed} s / ${ensayoDuracion} s`,        10, infoY+90);
      if(elapsed >= ensayoDuracion){
        isLogging=false; justFinished=true;
        g('btnStart').textContent='Iniciar ensayo';
        g('btnStart').classList.remove('active');
        sendMsg('STOP\n');
        setStatus('connected','Conectado');
      }
    }

    drawGraph(s, C);

    // ── Auto-save (CSV download) ──
    if(justFinished){
      justFinished=false;
      downloadCSV();
    }
  };

}, document.getElementById('canvas-container'));

// ── Graph ─────────────────────────────────────────────────
function drawGraph(s, C){
  const gx = 60, gy = 150;
  const gw = s.width - gx - 20;
  const gh = s.height - gy - 70;
  const tMin=0, tMax=40;
  const yLines=8, xLines=6;

  // Panel
  s.fill(255); s.stroke(C.border); s.strokeWeight(1);
  s.rect(gx, gy, gw, gh, 6);

  // Legend
  const lx=gx+15, ly=gy+14, lsz=11;
  s.noStroke(); s.fill(C.green); s.rect(lx, ly, lsz, lsz);
  s.fill(C.text); s.textSize(11); s.textAlign(s.LEFT, s.CENTER);
  s.text('Tsup', lx+lsz+4, ly+lsz/2);

  if(showTdew){
    s.fill(C.magenta); s.rect(lx+70, ly, lsz, lsz);
    s.fill(C.text); s.text('Tdew', lx+70+lsz+4, ly+lsz/2);
  } else {
    s.fill(C.blue); s.rect(lx+140, ly, lsz, lsz);
    s.fill(C.text); s.text('Tref', lx+140+lsz+4, ly+lsz/2);
  }

  // Y grid
  s.stroke(C.gridLine); s.strokeWeight(1);
  for(let i=0;i<=yLines;i++){
    const y = gy + gh - i*gh/yLines;
    s.line(gx, y, gx+gw, y);
    s.fill(C.gridTxt); s.noStroke();
    s.textSize(11); s.textAlign(s.RIGHT, s.CENTER);
    s.text((tMin + i*(tMax-tMin)/yLines).toFixed(0), gx-6, y);
    s.stroke(C.gridLine);
  }

  if(histTime.length < 2) return;

  const tStart = histTime[0];
  const tEnd   = Math.max(histTime[histTime.length-1], histTime[0]+1);

  // X grid
  for(let i=0;i<=xLines;i++){
    const xVal = s.lerp(tStart, tEnd, i/xLines);
    const x    = s.map(xVal, tStart, tEnd, gx, gx+gw);
    s.stroke(C.gridLine); s.line(x, gy, x, gy+gh);
    s.fill(C.gridTxt); s.noStroke();
    s.textSize(11); s.textAlign(s.CENTER, s.TOP);
    s.text(xVal.toFixed(0), x, gy+gh+4);
  }

  // Axis labels
  s.fill(C.text); s.noStroke(); s.textSize(13);
  s.textAlign(s.CENTER, s.TOP);
  s.text('Tiempo [s]', gx+gw/2, gy+gh+30);
  s.push(); s.translate(gx-42, gy+gh/2); s.rotate(-Math.PI/2);
  s.textAlign(s.CENTER, s.CENTER); s.text('Temperatura celda [°C]', 0, 0); s.pop();

  // Tsup line
  s.stroke(C.green); s.strokeWeight(1.5); s.noFill(); s.beginShape();
  for(let i=0;i<histTsup.length;i++){
    const x = s.constrain(s.map(histTime[i], tStart, tEnd, gx, gx+gw), gx, gx+gw);
    const y = s.constrain(s.map(histTsup[i], 0, tMax, gy+gh, gy), gy, gy+gh);
    s.vertex(x, y);
  }
  s.endShape();

  if(showTdew){
    s.stroke(C.magenta); s.strokeWeight(1.5); s.noFill(); s.beginShape();
    for(let i=0;i<histTdew.length;i++){
      const x = s.constrain(s.map(histTime[i], tStart, tEnd, gx, gx+gw), gx, gx+gw);
      const y = s.constrain(s.map(histTdew[i], 0, tMax, gy+gh, gy), gy, gy+gh);
      s.vertex(x, y);
    }
    s.endShape();
  } else {
    s.stroke(C.blue); s.strokeWeight(1.5);
    const yRef = s.map(Tref, 0, tMax, gy+gh, gy);
    s.line(gx, yRef, gx+gw, yRef);
  }
}

// ── CSV download ─────────────────────────────────────────
function downloadCSV(){
  let csv = 'Tiempo,Tamb,Tsup,Tdew,RH,Tref,PWM_Peltier,PWM_Fan,Kp,Ki,Kd,Lambda,Mu\n';
  for(let i=0;i<histTime.length;i++){
    csv += [
      histTime[i].toFixed(2),
      gv('txtTamb'), histTsup[i].toFixed(4), histTdew[i].toFixed(4),
      gv('txtRH'),   Tref,
      histPeltier[i].toFixed(2), histFan[i].toFixed(2),
      gv('txtKp'), gv('txtKi'), gv('txtKd'), gv('txtLam'), gv('txtMu')
    ].join(',') + '\n';
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `Tamb_${gv('txtTamb')}_ensayo_${String(ensayoNumero).padStart(3,'0')}.csv`;
  a.click();
}
});
</script>
</body>
</html>
